<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront Header</title>
</head>
<body>
<nav class="fixed top-0 left-0 w-full z-50 text-white shadow-lg">
    <div class="bg-[var(--color-primary)]">
        <div class="container mx-auto px-6 py-5 xl:px-8">
            <div class="flex items-center gap-4 lg:gap-8">
                <a href="homepage.html" class="flex flex-shrink-0 items-center hover:opacity-95 transition-opacity">
                    <img src="../assets/Images/Logo/Logo.png" alt="YAANTRA Logo" class="h-16 w-auto sm:h-20 filter-none">
                </a>

                <div class="hidden lg:flex flex-1 justify-center px-4">
                    <div class="relative w-full max-w-2xl rounded-2xl bg-white/10 border border-transparent transition-all duration-200 focus-within:bg-white/15 focus-within:border-white/20 focus-within:-translate-y-px">
                        <input type="text" placeholder="Search parts, accessories..."
                            class="w-full bg-transparent pl-5 pr-14 py-4 text-[1.05rem] text-white placeholder:text-gray-300 focus:outline-none">
                        <button class="absolute right-3 top-1/2 flex h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full text-white/90 transition-all duration-200 hover:bg-white/10 hover:text-white hover:-translate-y-[calc(50%+1px)]" title="Search">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="ml-auto flex items-center gap-1.5 sm:gap-3">
                    <button class="flex h-11 w-11 items-center justify-center rounded-full text-white/90 transition-all duration-200 hover:bg-white/10 hover:text-white hover:-translate-y-px" title="Wishlist">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                        </svg>
                    </button>

                    <a href="cart.html" class="relative flex items-center gap-2 rounded-full px-3 py-2 text-white/90 transition-all duration-200 hover:bg-white/10 hover:text-white hover:-translate-y-px" title="Shopping Cart">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m10-9l2 9m-6 9a1 1 0 11-2 0 1 1 0 012 0zm8 0a1 1 0 11-2 0 1 1 0 012 0z"/>
                        </svg>
                        <span class="hidden sm:inline text-sm font-medium">Cart</span>
                        <span id="cart-badge" class="absolute -top-0.5 left-7 bg-yellow-400 text-gray-900 text-xs font-bold rounded-full min-w-5 h-5 px-1 flex items-center justify-center hidden">0</span>
                    </a>

                    <button class="flex h-11 w-11 items-center justify-center rounded-full text-white/90 transition-all duration-200 hover:bg-white/10 hover:text-white hover:-translate-y-px" title="Notifications">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                    </button>


                    <div class="relative hidden" id="loggedInProfileDropdown">
                        <button id="profileDropdownButton" class="flex h-11 w-11 items-center justify-center rounded-full bg-white/15 text-sm font-bold uppercase text-white transition-colors hover:bg-white/25 focus:outline-none" title="My Account">
                            <span id="navProfileInitials"></span>
                        </button>
                        <div id="profileDropdown" class="absolute right-0 mt-3 w-48 bg-white rounded-lg shadow-xl py-1 z-50 hidden">
                            <div class="px-4 py-2 text-sm text-gray-700 border-b">
                                <p class="font-bold" id="dropdownUserName"></p>
                            </div>
                            <a href="../user/user-dashboard.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">My Profile</a>
                            <button onclick="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">Logout</button>
                        </div>
                    </div>

                    <a href="../auth/register-customer.html" class="flex h-11 w-11 items-center justify-center rounded-full text-white/90 transition-all duration-200 hover:bg-white/10 hover:text-white hover:-translate-y-px" title="Account" id="loggedOutSignIn">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </a>

                    <button class="flex h-11 w-11 items-center justify-center rounded-full text-white/90 transition-all duration-200 hover:bg-white/10 hover:text-white hover:-translate-y-px lg:hidden" onclick="toggleMobileMenu()" title="Open navigation">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="mt-4 lg:hidden">
                <div class="relative rounded-2xl bg-white/10 border border-transparent transition-all duration-200 focus-within:bg-white/15 focus-within:border-white/20 focus-within:-translate-y-px">
                    <input type="text" placeholder="Search parts, accessories..."
                        class="w-full bg-transparent pl-5 pr-14 py-3.5 text-white placeholder:text-gray-300 focus:outline-none">
                    <button class="absolute right-3 top-1/2 flex h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full text-white/90 transition-all duration-200 hover:bg-white/10 hover:text-white hover:-translate-y-[calc(50%+1px)]" title="Search">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="hidden md:flex items-center justify-between gap-6 pt-4 mt-4 border-t border-white/10">
                <div class="relative group flex-shrink-0">
                    <!-- <button class="flex items-center space-x-3 rounded-full px-4 py-2.5 text-lg font-semibold text-white transition-all duration-200 hover:bg-[var(--color-primary-hover)]/40 hover:-translate-y-px hover:shadow-[inset_0_0_0_1px_rgba(255,255,255,0.08)]">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/>
                        </svg>
                        <span>Shop Categories</span>
                    </button> -->
                    
                </div>

                <div class="flex items-center gap-8 text-lg font-semibold text-white/95">
                    <a href="homepage.html" data-nav-link="home" class="storefront-nav-link border-b-2 border-transparent pb-1 transition-all duration-200 hover:-translate-y-px hover:border-white/90 hover:text-white">Home</a>
                    <a href="shop.html" data-nav-link="shop" class="storefront-nav-link border-b-2 border-transparent pb-1 transition-all duration-200 hover:-translate-y-px hover:border-white/90 hover:text-white">Shop</a>
                    <a href="#" data-nav-link="delivery" class="storefront-nav-link border-b-2 border-transparent pb-1 transition-all duration-200 hover:-translate-y-px hover:border-white/90 hover:text-white">About Us</a>
                    <a href="#" data-nav-link="about" class="storefront-nav-link border-b-2 border-transparent pb-1 transition-all duration-200 hover:-translate-y-px hover:border-white/90 hover:text-white">Contact Us</a>
                </div>
            </div>
        </div>
    </div>

    <div id="mobile-menu" class="hidden border-t border-[#e8ebe9] bg-[var(--color-light)] md:hidden">
        <div class="container mx-auto px-6 py-4 space-y-2">
            <button class="flex w-full items-center gap-3 rounded-full px-2 py-2 text-left font-semibold text-gray-700 transition-all duration-200 hover:bg-[var(--color-secondary)]">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/>
                </svg>
                <span>Navigation</span>
            </button>
            <a href="homepage.html" data-nav-link="home" class="block py-2 text-gray-700 font-medium hover:text-[var(--color-primary)] transition">Home</a>
            <a href="shop.html" data-nav-link="shop" class="block py-2 text-gray-700 font-medium hover:text-[var(--color-primary)] transition">Shop</a>
            <a href="#" data-nav-link="delivery" class="block py-2 text-gray-700 font-medium hover:text-[var(--color-primary)] transition">Delivery</a>
            <a href="#" data-nav-link="about" class="block py-2 text-gray-700 font-medium hover:text-[var(--color-primary)] transition">About</a>
            <a href="#" data-nav-link="blog" class="block py-2 text-gray-700 font-medium hover:text-[var(--color-primary)] transition">Blog</a>
        </div>
    </div>
</nav>
</body>
</html>
