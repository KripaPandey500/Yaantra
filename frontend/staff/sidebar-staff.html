	<div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md p-10 relative flex flex-col items-center">

		<div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-6">
			<i data-lucide="power" class="w-7 h-7"></i>
		</div>

			<button onclick="closeLogoutModal()" class="flex-1 py-4 rounded-2xl bg-gray-100 text-gray-700 text-xs font-bold uppercase tracking-widest hover:bg-gray-200 transition">Cancel</button>
			<button onclick="logout()" class="flex-1 py-4 rounded-2xl bg-red-600 text-white text-xs font-bold uppercase tracking-widest hover:bg-red-700 shadow-lg shadow-red-200/50 transition">Logout</button>

	</div>

<!-- MOBILE BUTTON -->

</button>

<script>
	
	window.showLogoutModal = function() { 
		document.getElementById('logoutModal').classList.remove('hidden'); 
	}
	window.closeLogoutModal = function() { 
		document.getElementById('logoutModal').classList.add('hidden'); 
	}
	window.logout = function() {
		localStorage.removeItem('token');
		localStorage.removeItem('userEmail');
		localStorage.removeItem('firstName');
		localStorage.removeItem('lastName');
		localStorage.removeItem('userRole');
		localStorage.removeItem('profilePic');
		window.location.href = '/frontend/auth/login.html?message=Logged out successfully!&type=success';
	}

	// 1. Initialize Icons
	lucide.createIcons();

	
	function highlightActiveLink() {
		const currentPath = window.location.pathname;
		document.querySelectorAll('[data-nav-link]').forEach(link => {
			const href = link.getAttribute('href');
			if (href && currentPath.includes(href.split('/').pop())) {
				
				link.classList.remove('text-white/60', 'hover:bg-white/10');
				link.classList.add('bg-emerald-600', 'text-white', 'shadow-lg', 'font-semibold');
				
				const icon = link.querySelector('i');
				if(icon) icon.classList.add('text-white');
			}
		});
	}

	// 2. Sidebar Handlers
	function openStaffSidebar() {
		document.getElementById('staffSidebar').classList.remove('-translate-x-full');
		document.getElementById('sidebarOverlay').classList.remove('hidden');
	}
	function closeStaffSidebar() {
		document.getElementById('staffSidebar').classList.add('-translate-x-full');
		document.getElementById('sidebarOverlay').classList.add('hidden');
	}


	document.getElementById('sidebarOverlay')?.addEventListener('click', closeStaffSidebar);

	document.addEventListener('DOMContentLoaded', highlightActiveLink);
</script>
