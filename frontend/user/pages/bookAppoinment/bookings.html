<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Booking History | Yaantra User</title>
	
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
	<link rel="stylesheet" href="/frontend/assets/css/custom.css">
	<link rel="stylesheet" href="/frontend/assets/css/tailwind.css">

	<style>
		body {
			font-family: 'Plus Jakarta Sans', sans-serif;
			letter-spacing: -0.02em;
			background-color: #f8faf9;
		}
		.ts-alert-success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; padding: 1rem; border-radius: 1rem; font-weight: 700; }
		.ts-alert-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; padding: 1rem; border-radius: 1rem; font-weight: 700; }
		
		
		.table-container {
			border: 1px solid rgba(16, 185, 129, 0.2);
			box-shadow: 0 20px 25px -5px rgba(6, 38, 33, 0.05);
		}
	</style>
</head>

<body class="min-h-screen text-[#062621]">
<script>
	const token = localStorage.getItem('token');
	if (!token) {
		window.location.href = '/frontend/auth/login.html?message=Login First';
	}
</script>

<div id="sidebar-container"></div>

<div class="md:ml-64 min-h-screen transition-all duration-300">
	
	<!-- TOP HEADER -->
	<header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex items-center justify-between">
		<div>
			<h1 class="text-xl font-extrabold text-[#062621] tracking-tighter uppercase">Booking History</h1>
			<p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase opacity-70 mt-1">View Your Service Bookings</p>
		</div>
		<button id="addBookingBtn" class="bg-[#062621] text-white px-6 py-3 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] transition hover:opacity-95 shadow-xl shadow-emerald-950/10 flex items-center gap-2">
			<i data-lucide="plus" class="w-5 h-5"></i>
			<span>Book Appointment</span>
		</button>
	</header>

	<div class="p-8 space-y-8 max-w-[1600px] mx-auto">
		
		<!-- SEARCH BAR -->
		<div class="relative group">
			<i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-300 group-focus-within:text-emerald-500 transition"></i>
			<input id="searchInput" type="text" placeholder="Search booking or vehicle..." 
				class="w-full bg-white border-none shadow-sm rounded-2xl py-5 pl-14 pr-6 focus:ring-2 focus:ring-emerald-500/20 outline-none font-medium text-sm transition">
		</div>

		<div id="bookingAlert" class="hidden"></div>

		<!-- BOOKINGS TABLE -->
		<div class="table-container bg-white rounded-[2.5rem] overflow-hidden">
			<div class="px-8 py-6 flex items-center justify-between border-b border-gray-50">
				<h2 class="text-base font-bold text-[#062621] uppercase tracking-tight">Recent Bookings</h2>
				<button onclick="location.reload()" class="text-gray-400 hover:text-emerald-500 transition">
					<i data-lucide="refresh-cw" class="w-4 h-4"></i>
				</button>
			</div>

			<div class="overflow-x-auto">
				<table class="w-full text-left">
					<thead class="bg-[#062621] text-white/50 text-[10px] uppercase tracking-[0.2em]">
						<tr>
							<th class="px-8 py-5 font-bold">S.N</th>
							<th class="px-8 py-5 font-bold">Vehicle</th>
							<th class="px-8 py-5 font-bold">Service Type</th>
							<th class="px-8 py-5 font-bold">Service Date</th>
							<th class="px-8 py-5 font-bold">Status</th>
							<th class="px-8 py-5 font-bold text-right">Actions</th>
						</tr>
					</thead>
					<tbody id="bookingTable" class="divide-y divide-gray-50 text-sm">
						
					</tbody>
				</table>
			</div>

			<!-- PAGINATION -->
			<div class="flex justify-center items-center px-10 py-6 bg-gray-50/50">
				<button id="prevBtn" onclick="prevPage()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-gray-100 hover:bg-emerald-50 transition text-gray-400 disabled:opacity-30">
					<i data-lucide="chevron-left" class="w-5 h-5"></i>
				</button>
				<div id="paginationNumbers" class="flex gap-2"></div>
				<button id="nextBtn" onclick="nextPage()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-gray-100 hover:bg-emerald-50 transition text-gray-400 disabled:opacity-30">
					<i data-lucide="chevron-right" class="w-5 h-5"></i>
				</button>
			</div>
		</div>
	</div>
</div>

<!-- CANCEL BOOKING MODAL -->
<div id="cancelBookingModal" class="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden p-4">
	<div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-10 text-center">
		<div class="w-16 h-16 bg-yellow-50 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-6">
			<i data-lucide="alert-circle" class="w-8 h-8"></i>
		</div>
		<h2 class="text-xl font-extrabold text-[#062621]">Cancel Booking?</h2>
		<p class="text-gray-400 text-sm mt-2 mb-8">Are you sure you want to cancel this booking?</p>
		<div class="flex gap-3">
			<button onclick="closeCancelBookingModal()" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold text-[10px] uppercase">No</button>
			<button id="confirmCancelBtn" class="flex-1 py-4 bg-yellow-600 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg shadow-yellow-200">Cancel Booking</button>
		</div>
	</div>
</div>

<!-- REVIEW MODAL -->
<div id="reviewModal" class="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden p-4">
	<div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md p-10">
		<h2 class="text-xl font-extrabold text-[#062621] text-center mb-6">Give Your Review</h2>
		<form id="reviewForm" class="space-y-6" novalidate>
			<input type="hidden" id="reviewBookingId" name="bookingId">
			
			<div class="space-y-3">
				<label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.15em]">Rating</label>
				<div class="flex gap-2 justify-center">
					<button type="button" class="star text-3xl text-gray-300 hover:text-yellow-400 transition" data-value="1">★</button>
					<button type="button" class="star text-3xl text-gray-300 hover:text-yellow-400 transition" data-value="2">★</button>
					<button type="button" class="star text-3xl text-gray-300 hover:text-yellow-400 transition" data-value="3">★</button>
					<button type="button" class="star text-3xl text-gray-300 hover:text-yellow-400 transition" data-value="4">★</button>
					<button type="button" class="star text-3xl text-gray-300 hover:text-yellow-400 transition" data-value="5">★</button>
				</div>
				<input type="hidden" id="reviewRating" name="rating" required>
			</div>
			
			<div class="space-y-2">
				<label for="reviewComment" class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.15em]">Comment</label>
				<textarea id="reviewComment" name="comment" rows="4" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition" placeholder="Write your feedback..." required></textarea>
			</div>
			
			<div class="flex gap-3 pt-4 border-t border-gray-50">
				<button type="button" onclick="closeReviewModal()" class="flex-1 py-3 bg-gray-50 text-gray-400 rounded-2xl font-bold text-[11px] uppercase hover:bg-gray-100 transition">Cancel</button>
				<button type="submit" class="flex-1 py-3 bg-[#062621] text-white rounded-2xl font-bold text-[11px] uppercase shadow-xl shadow-emerald-950/10 hover:opacity-95 transition">Submit Review</button>
			</div>
		</form>
	</div>
</div>

<!-- DELETE BOOKING MODAL -->
<div id="deleteBookingModal" class="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden p-4">
	<div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-10 text-center">
		<div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
			<i data-lucide="trash-2" class="w-8 h-8"></i>
		</div>
		<h2 class="text-xl font-extrabold text-[#062621]">Delete Booking?</h2>
		<p class="text-gray-400 text-sm mt-2 mb-8">Are you sure you want to delete this booking?</p>
		<div class="flex gap-3">
			<button type="button" onclick="closeDeleteBookingModal()" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold text-[10px] uppercase">No</button>
			<button type="button" id="confirmDeleteBtn" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg shadow-red-200">Delete</button>
		</div>
	</div>
</div>

<template id="bookingRowTemplate">
	<tr class="border-b hover:bg-gray-50 align-top transition">
		<td class="px-8 py-5 booking-sn font-medium"></td>
		<td class="px-8 py-5 booking-vehicle font-semibold text-emerald-600"></td>
		<td class="px-8 py-5 booking-service text-gray-600"></td>
		<td class="px-8 py-5 booking-date text-gray-600"></td>
		<td class="px-8 py-5">
			<span class="booking-status px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-wide"></span>
		</td>
		<td class="px-8 py-5 text-right space-x-2 flex justify-end gap-3">
			<button type="button" class="booking-review-btn text-emerald-600 hover:text-emerald-700 transition hidden">
				<i data-lucide="star" class="w-5 h-5"></i>
			</button>
			<button type="button" class="booking-cancel-btn text-yellow-600 hover:text-yellow-700 transition hidden">
				<i data-lucide="x-circle" class="w-5 h-5"></i>
			</button>
			<button type="button" class="booking-delete-btn text-slate-700 hover:text-red-600 transition">
				<i data-lucide="trash-2" class="w-5 h-5"></i>
			</button>
		</td>
	</tr>
</template>

<template id="bookingEmptyRowTemplate">
	<tr class="border-b">
		<td class="px-8 py-6 text-center text-sm text-gray-400 font-medium" colspan="6">No bookings found.</td>
	</tr>
</template>

<script src="/frontend/assets/js/alert.js"></script>
<script src="../../js/bookings.js"></script>
<script src="../../js/bookingReview.js"></script>
<script>
	// Initialize sidebar
	fetch('/frontend/user/includes/sidebar-user.html')
		.then(res => res.text())
		.then(data => {
			document.getElementById('sidebar-container').innerHTML = data;
			if (typeof lucide !== 'undefined') lucide.createIcons();

			function initUserSidebar(container) {
				if (!container) return;
				const currentPath = window.location.pathname.replace(/\/+$/, '');
				container.querySelectorAll('[data-nav-link]').forEach((link) => {
					const linkPath = new URL(link.href, window.location.origin).pathname.replace(/\/+$/, '');
					if (linkPath === currentPath) {
						link.classList.add('bg-emerald-600', 'shadow-lg', 'text-white', 'font-semibold');
						link.classList.remove('text-white/60', 'hover:bg-white/10');
					}
				});
			}
			initUserSidebar(document.getElementById('sidebar-container'));
		});

	function closeCancelBookingModal() { 
		document.getElementById('cancelBookingModal').classList.add('hidden'); 
	}

	function closeDeleteBookingModal() { 
		document.getElementById('deleteBookingModal').classList.add('hidden'); 
	}

	function closeReviewModal() { 
		document.getElementById('reviewModal').classList.add('hidden'); 
	}

	
	window.addEventListener('load', () => {
		loadBookings(1);
	});
</script>
</body>
</html>
