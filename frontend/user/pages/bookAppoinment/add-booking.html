<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Book Appointment | Yaantra User</title>
	
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
	<link rel="stylesheet" href="/frontend/assets/css/custom.css">
	<link rel="stylesheet" href="/frontend/assets/css/tailwind.css">

	<style>
		body {
			font-family: 'Plus Jakarta Sans', sans-serif;
			letter-spacing: -0.02em;
			background-color: #f8faf9;
		}
		.admin-input {
			background-color: #f9fafb;
			border: 1px solid #f3f4f6;
			border-radius: 1.25rem;
			padding: 0.85rem 1.25rem;
			font-size: 0.875rem;
			width: 100%;
			outline: none;
			transition: all 0.2s;
		}
		.admin-input:focus {
			background-color: #fff;
			border-color: #10b981;
			box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.05);
		}
		.admin-input::placeholder {
			color: #cbd5e1;
		}
		.field-error {
			color: #ef4444;
			font-size: 0.8125rem;
			font-weight: bold;
			margin-top: 0.375rem;
			padding-left: 0.25rem;
		}
		.ts-alert-success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; padding: 1rem; border-radius: 1rem; font-weight: 700; }
		.ts-alert-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; padding: 1rem; border-radius: 1rem; font-weight: 700; }
	</style>
</head>

<body class="min-h-screen text-[#062621]">
<script>
	const token = localStorage.getItem('token');
	if (!token) {
		window.location.href = '/frontend/auth/login.html?message=Login First';
	}
</script>

<div id="sidebar-container"></div>

<div class="md:ml-64 min-h-screen transition-all duration-300">
	
	<!-- TOP HEADER -->
	<header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex items-center justify-between">
		<div>
			<h1 class="text-xl font-extrabold text-[#062621] tracking-tighter uppercase">Book Appointment</h1>
			<p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase opacity-70 mt-1">Schedule Your Vehicle Service</p>
		</div>
	</header>

	<div class="p-4 max-w-5xl mx-auto">
		
		<!-- FORM CARD -->
		<div class="bg-white rounded-[2.5rem] shadow-xl border border-white p-7">
			<div class="mb-5 text-center">
				<div class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
					<i data-lucide="calendar" class="w-7 h-7"></i>
				</div>
				<h2 class="text-xl font-black text-[#062621] uppercase tracking-tighter">Book Appointment</h2>
			</div>

			<form id="booking-form" class="space-y-5" novalidate>
				<div id="formSuccessBox" class="hidden bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-2xl p-3 text-center text-xs font-bold mb-3">
					<span>Appointment booked successfully!</span>
				</div>

				<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
					<div class="space-y-1.5">
						<label for="vehicleId" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Vehicle</label>
						<select id="vehicleId" name="vehicleId" class="admin-input" required>
							<option value="">Select Vehicle</option>
						</select>
						<p id="vehicleIdError" class="hidden field-error"></p>
					</div>

					<div class="space-y-1.5">
						<label for="serviceType" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Service Type</label>
						<input type="text" id="serviceType" name="serviceType" maxlength="100" placeholder="Enter Service Type" class="admin-input" required>
						<p id="serviceTypeError" class="hidden field-error"></p>
					</div>

					<div class="space-y-1.5">
						<label for="serviceDate" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Service Date</label>
						<input type="date" id="serviceDate" name="serviceDate" class="admin-input">
						<p id="serviceDateError" class="hidden field-error"></p>
					</div>
				</div>

				<div class="space-y-1.5">
					<label for="problemDescription" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Problem Description</label>
					<textarea id="problemDescription" name="problemDescription" maxlength="1000" rows="3" placeholder="Describe the problem..." class="admin-input resize-none"></textarea>
					<p id="problemDescriptionError" class="hidden field-error"></p>
				</div>

				<div class="space-y-1.5">
					<label for="note" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Additional Note</label>
					<textarea id="note" name="note" maxlength="500" rows="2" placeholder="Any additional notes..." class="admin-input resize-none"></textarea>
					<p id="noteError" class="hidden field-error"></p>
				</div>

				<div class="flex gap-3 pt-3 border-t border-gray-50">
					<button type="submit" class="flex-1 bg-[#062621] text-white py-3 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition hover:opacity-95 shadow-xl shadow-emerald-950/10">Book Appointment</button>
					<a href="bookings.html" class="flex-1 bg-gray-50 text-gray-400 py-3 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-gray-100 transition text-center">Back to Bookings</a>
				</div>
			</form>
		</div>
	</div>
</div>

<script src="/frontend/assets/js/alert.js"></script>
<script src="../../js/bookings.js"></script>
<script>
	// Initialize sidebar
	fetch('/frontend/user/includes/sidebar-user.html')
		.then(res => res.text())
		.then(data => {
			document.getElementById('sidebar-container').innerHTML = data;
			if (typeof lucide !== 'undefined') lucide.createIcons();

			function initUserSidebar(container) {
				if (!container) return;
				const currentPath = window.location.pathname.replace(/\/+$/, '');
				container.querySelectorAll('[data-nav-link]').forEach((link) => {
					const linkPath = new URL(link.href, window.location.origin).pathname.replace(/\/+$/, '');
					if (linkPath === currentPath) {
						link.classList.add('bg-emerald-600', 'shadow-lg', 'text-white', 'font-semibold');
						link.classList.remove('text-white/60', 'hover:bg-white/10');
					}
				});
			}
			initUserSidebar(document.getElementById('sidebar-container'));
		});

	// Handle form submission
	document.addEventListener('DOMContentLoaded', function() {
		const bookingForm = document.getElementById('booking-form');
		const formSuccessBox = document.getElementById('formSuccessBox');

		if (bookingForm) {
			bookingForm.addEventListener('submit', async function(e) {
				// Success message will be shown by bookings.js
				
			});
		}

		// Show success box if redirected from successful booking
		const params = new URLSearchParams(window.location.search);
		if (params.get('status') === 'added') {
			if (formSuccessBox) {
				formSuccessBox.classList.remove('hidden');
				setTimeout(() => {
					formSuccessBox.classList.add('hidden');
				}, 3000);
			}
		}
	});
</script>
</body>
</html>
