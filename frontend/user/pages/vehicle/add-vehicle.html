<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle | Yaantra User</title>
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/frontend/assets/css/custom.css">
    <link rel="stylesheet" href="/frontend/assets/css/tailwind.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.02em;
            background-color: #f8faf9;
        }
        .admin-input {
            background-color: #f9fafb;
            border: 1px solid #f3f4f6;
            border-radius: 1.25rem;
            padding: 0.85rem 1.25rem;
            font-size: 0.875rem;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }
        .admin-input:focus {
            background-color: #fff;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.05);
        }
        .admin-input::placeholder {
            color: #cbd5e1;
        }
        .field-error {
            color: #ef4444;
            font-size: 0.8125rem;
            font-weight: bold;
            margin-top: 0.375rem;
            padding-left: 0.25rem;
        }
        .ts-alert-success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; padding: 1rem; border-radius: 1rem; font-weight: 700; }
        .ts-alert-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; padding: 1rem; border-radius: 1rem; font-weight: 700; }
    </style>
</head>

<body class="min-h-screen text-[#062621]">
<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/frontend/auth/login.html?message=Login First';
    }
</script>

<div id="sidebar-container"></div>

<div class="md:ml-64 min-h-screen transition-all duration-300">
    
    <!-- TOP HEADER -->
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex items-center justify-between">
        <div>
            <h1 class="text-xl font-extrabold text-[#062621] tracking-tighter uppercase">My Vehicles</h1>
            <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase opacity-70 mt-1">Manage Your Vehicle Information</p>
        </div>
        <button id="addVehicleHeaderBtn" class="bg-[#062621] text-white px-6 py-3 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] transition hover:opacity-95 shadow-xl shadow-emerald-950/10 flex items-center gap-2">
            <i data-lucide="plus" class="w-5 h-5"></i>
            <span>Add Vehicle</span>
        </button>
    </header>

    <div class="p-4 max-w-5xl mx-auto">
        
        <!-- ALERT BOX -->
        <div id="vehicleAlert" class="hidden mb-6 text-center"></div>

        <!-- VEHICLES LIST SECTION -->
        <div id="vehiclesListSection" class="hidden">
            <div id="vehiclesEmptyHint" class="hidden text-center text-gray-400 mb-8 py-8">
                <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 opacity-40"></i>
                <p class="text-sm font-medium">No vehicles found. Add your first vehicle!</p>
            </div>
            <div id="vehiclesList" class="grid grid-cols-1 gap-6 mb-8"></div>
        </div>

        <!-- ADD VEHICLE FORM SECTION -->
        <div id="addVehicleFormSection" class="hidden mt-8">
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-white p-8">
                <div class="mb-8 text-center">
                    <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="car" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-xl font-black text-[#062621] uppercase tracking-tighter">Add Vehicle</h2>
                </div>

                <form id="addVehicleForm" class="space-y-6" novalidate>
                    <div id="formSuccessBox" class="hidden bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-2xl p-5 text-center text-xs font-bold mb-5">
                        <span>Vehicle added successfully!</span>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-3">
                            <label for="type" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Vehicle Type</label>
                            <select id="type" name="type" class="admin-input" required>
                                <option value="">Select Type</option>
                                <option value="Car">Car</option>
                                <option value="Bike">Bike</option>
                                <option value="Scooter">Scooter</option>
                                <option value="Truck">Truck</option>
                                <option value="Van">Van</option>
                                <option value="Other">Other</option>
                            </select>
                            <p id="typeError" class="hidden field-error"></p>
                        </div>

                        <div class="space-y-3">
                            <label for="vehicleNumber" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Vehicle Number</label>
                            <input type="text" id="vehicleNumber" name="vehicleNumber" placeholder="BA-12-PA-1234" class="admin-input" required>
                            <p id="vehicleNumberError" class="hidden field-error"></p>
                        </div>

                        <div class="space-y-3">
                            <label for="brand" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Brand</label>
                            <input type="text" id="brand" name="brand" placeholder="Toyota" class="admin-input" required>
                            <p id="brandError" class="hidden field-error"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-3">
                            <label for="model" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Model</label>
                            <input type="text" id="model" name="model" placeholder="Corolla" class="admin-input" required>
                            <p id="modelError" class="hidden field-error"></p>
                        </div>

                        <div class="space-y-3">
                            <label for="manufactureYear" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Manufacture Year</label>
                            <input type="number" id="manufactureYear" name="manufactureYear" min="1900" max="2100" placeholder="2022" class="admin-input" required>
                            <p id="manufactureYearError" class="hidden field-error"></p>
                        </div>

                        <div class="space-y-3">
                            <label for="color" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Color</label>
                            <input type="text" id="color" name="color" placeholder="White" class="admin-input" required>
                            <p id="colorError" class="hidden field-error"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-3">
                            <label for="registrationDate" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Registration Date</label>
                            <input type="date" id="registrationDate" name="registrationDate" class="admin-input">
                            <p id="registrationDateError" class="hidden field-error"></p>
                        </div>

                        <div class="space-y-3">
                            <label for="engineNumber" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Engine Number</label>
                            <input type="text" id="engineNumber" name="engineNumber" placeholder="ENG12345" class="admin-input" required>
                            <p id="engineNumberError" class="hidden field-error"></p>
                        </div>

                        <div class="space-y-3">
                            <label for="chassisNumber" class="block text-[9px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Chassis Number</label>
                            <input type="text" id="chassisNumber" name="chassisNumber" placeholder="CHS987654" class="admin-input" required>
                            <p id="chassisNumberError" class="hidden field-error"></p>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-4 border-t border-gray-50">
                        <button type="submit" class="flex-1 bg-[#062621] text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition hover:opacity-95 shadow-xl shadow-emerald-950/10">Add Vehicle</button>
                        <button id="cancelAddVehicleBtn" type="button" class="flex-1 bg-gray-50 text-gray-400 py-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-gray-100 transition">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</div>

<!-- DELETE VEHICLE MODAL -->
<div id="deleteVehicleModal" class="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden p-4">
    <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-10 text-center">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="trash-2" class="w-8 h-8"></i>
        </div>
        <h2 class="text-xl font-extrabold text-[#062621]">Delete Vehicle?</h2>
        <p class="text-gray-400 text-sm mt-2 mb-8">Are you sure you want to delete this vehicle?</p>
        <div class="flex gap-3">
            <button type="button" onclick="closeDeleteVehicleModal()" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold text-[10px] uppercase">Cancel</button>
            <button type="button" onclick="confirmDeleteVehicle()" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg shadow-red-200">Delete</button>
        </div>
    </div>
</div>

<script src="/frontend/assets/js/alert.js"></script>
<script src="../../js/addVehicle.js"></script>
<script>
    // Initialize sidebar
    fetch('/frontend/user/includes/sidebar-user.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('sidebar-container').innerHTML = data;
            if (typeof lucide !== 'undefined') lucide.createIcons();

            
            const currentPath = window.location.pathname;
            document.querySelectorAll('[data-nav-link]').forEach(link => {
                const href = link.getAttribute('href');
                if (href && currentPath.includes(href.split('/').pop())) {
                    link.classList.add('bg-emerald-600', 'shadow-lg', 'text-white', 'font-semibold');
                    link.classList.remove('text-white/60', 'hover:bg-white/10');
                }
            });
        });
</script>
</html>
