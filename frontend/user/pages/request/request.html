
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Part Requests | Yaantra User</title>
	
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
	<link rel="stylesheet" href="/frontend/assets/css/custom.css">
	<link rel="stylesheet" href="/frontend/assets/css/tailwind.css">

	<style>
		body {
			font-family: 'Plus Jakarta Sans', sans-serif;
			letter-spacing: -0.02em;
			background-color: #f8faf9;
		}
		.admin-input {
			background-color: #f9fafb;
			border: 1px solid #f3f4f6;
			border-radius: 1.25rem;
			padding: 0.85rem 1.25rem;
			font-size: 0.875rem;
			width: 100%;
			outline: none;
			transition: all 0.2s;
		}
		.admin-input:focus {
			background-color: #fff;
			border-color: #10b981;
			box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.05);
		}
		.admin-input::placeholder {
			color: #cbd5e1;
		}
		.ts-alert-success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; padding: 1rem; border-radius: 1rem; font-weight: 700; }
		.ts-alert-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; padding: 1rem; border-radius: 1rem; font-weight: 700; }
	</style>
</head>

<body class="min-h-screen text-[#062621]">
<script>
	const token = localStorage.getItem('token');
	if (!token) {
		window.location.href = '/frontend/auth/login.html?message=Login First';
	}
</script>

<div id="sidebar-container"></div>

<div class="md:ml-64 min-h-screen transition-all duration-300">
	
	<!-- TOP HEADER -->
	<header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex items-center justify-between">
		<div>
			<h1 class="text-xl font-extrabold text-[#062621] tracking-tighter uppercase">Part Requests</h1>
			<p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase opacity-70 mt-1">Submit & Track Part Requests</p>
		</div>
	</header>

	<div class="p-8 max-w-7xl mx-auto">
		
		<!-- ALERT BOX -->
		<div id="alertBox" class="hidden mb-6 text-center"></div>

		<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
			
			<!-- REQUEST FORM -->
			<div class="bg-white rounded-[2.5rem] shadow-xl border border-white p-8">
				<div class="mb-6 text-center">
					<div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
						<i data-lucide="package" class="w-8 h-8"></i>
					</div>
					<h2 class="text-2xl font-black text-[#062621] uppercase tracking-tighter">Part Request</h2>
				</div>

				<form id="part-request-form" class="space-y-6" novalidate>
					<div id="formSuccessBox" class="hidden bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-2xl p-4 text-center text-sm font-bold mb-4">
						<span>Part request submitted successfully!</span>
					</div>

					<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
						<div class="space-y-2">
							<label for="partName" class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Part Name</label>
							<input type="text" id="partName" name="partName" maxlength="200" placeholder="Enter Part Name" class="admin-input" required>
							<p id="partNameError" class="hidden text-red-500 text-[10px] font-bold mt-1 px-1"></p>
						</div>

						<div class="space-y-2">
							<label for="quantity" class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Quantity</label>
							<input type="number" id="quantity" name="quantity" min="1" max="1000" placeholder="Enter Quantity" class="admin-input" required>
							<p id="quantityError" class="hidden text-red-500 text-[10px] font-bold mt-1 px-1"></p>
						</div>
					</div>

					<div class="space-y-2">
						<label for="description" class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.15em] ml-1">Description</label>
						<textarea id="description" name="description" maxlength="1000" rows="3" placeholder="Enter Description" class="admin-input resize-none" required></textarea>
						<p id="descriptionError" class="hidden text-red-500 text-[10px] font-bold mt-1 px-1"></p>
					</div>

					<div class="flex gap-4 pt-4 border-t border-gray-50">
						<button type="submit" class="flex-1 bg-[#062621] text-white py-3 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] transition hover:opacity-95 shadow-xl shadow-emerald-950/10">Submit Request</button>
						<button type="reset" class="flex-1 bg-gray-50 text-gray-400 py-3 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] hover:bg-gray-100 transition">Clear</button>
					</div>
				</form>
			</div>

			<!-- RECENT REQUESTS -->
			<div class="bg-white rounded-[2.5rem] shadow-xl border border-white p-8">
				<h3 class="text-base font-bold text-[#062621] uppercase tracking-tight mb-4">Recent Requests</h3>
				<div id="requestsList" class="space-y-3 max-h-[400px] overflow-y-auto">
					<p class="text-sm text-gray-400 text-center py-6">No requests submitted yet.</p>
				</div>
			</div>

		</div>
	</div>
</div>

<script src="../../../assets/js/alert.js"></script>
<script src="../../js/partRequest.js"></script>
<script>
	// Initialize sidebar
	fetch('/frontend/user/includes/sidebar-user.html')
		.then(res => res.text())
		.then(data => {
			document.getElementById('sidebar-container').innerHTML = data;
			if (typeof lucide !== 'undefined') lucide.createIcons();

			function initUserSidebar(container) {
				if (!container) return;
				const currentPath = window.location.pathname.replace(/\/+$/, '');
				container.querySelectorAll('[data-nav-link]').forEach((link) => {
					const linkPath = new URL(link.href, window.location.origin).pathname.replace(/\/+$/, '');
					if (linkPath === currentPath) {
						link.classList.add('bg-emerald-600', 'shadow-lg', 'text-white', 'font-semibold');
						link.classList.remove('text-white/60', 'hover:bg-white/10');
					}
				});
			}
			initUserSidebar(document.getElementById('sidebar-container'));
		});

	// Alert helper function
	function showAlert(elementId, message, type = 'error') {
		const alertBox = document.getElementById(elementId);
		if (!alertBox) return;
		
		alertBox.className = `text-center text-sm rounded-xl padding-4 ${
			type === 'success' 
				? 'bg-emerald-50 text-emerald-700 border border-emerald-200' 
				: 'bg-red-50 text-red-700 border border-red-200'
		}`;
		alertBox.textContent = message;
		alertBox.classList.remove('hidden');
		
		setTimeout(() => {
			alertBox.classList.add('hidden');
		}, 5000);
	}
</script>
</body>
</html>
