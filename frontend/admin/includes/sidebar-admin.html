<!-- Logout Modal -->
<div id="logoutModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-xs p-8 flex flex-col items-center">
        <div class="w-14 h-14 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-4">
            <i data-lucide="log-out" class="w-6 h-6"></i>
        </div>
        <h2 class="text-xl font-bold text-gray-900">Logout</h2>
        <p class="text-sm text-gray-500 text-center mt-2 mb-8">Are you sure you want to exit the admin terminal?</p>
        <div class="flex gap-3 w-full">
            <button id="cancelLogout" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 text-xs font-bold uppercase tracking-widest hover:bg-gray-200 transition">No</button>
            <button id="confirmLogout" class="flex-1 py-3 rounded-xl bg-red-600 text-white text-xs font-bold uppercase tracking-widest hover:bg-red-700 shadow-lg shadow-red-200 transition">Yes</button>
        </div>
    </div>
</div>

<script>
    // 1. Initialize Icons
    if (window.lucide) {
        lucide.createIcons();
    }

    // 2. Active Link Logic
    function highlightActiveSidebarLink() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('[data-nav-link]');
        
        navLinks.forEach(link => {
            if (currentPath.includes(link.getAttribute('href'))) {
                // Apply Active Styles
                link.classList.remove('text-white/60');
                link.classList.add('bg-white', 'text-[#062621]', 'shadow-xl');
                
                // Fix icon inside active link
                const icon = link.querySelector('i');
                if (icon) {
                    icon.setAttribute('stroke', '#062621');
                    icon.classList.remove('text-white/60');
                }
            }
        });
    }

    // 3. Mobile Menu Functions
    function openSidebar() {
        document.getElementById('adminSidebar').classList.remove('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.remove('hidden');
    }
    function closeSidebar() {
        document.getElementById('adminSidebar').classList.add('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.add('hidden');
    }

    // 4. Logout Logic Initialization
    function initLogoutLogic() {
        const trigger = document.getElementById('logoutTrigger');
        const modal = document.getElementById('logoutModal');
        const cancel = document.getElementById('cancelLogout');
        const confirm = document.getElementById('confirmLogout');
        const overlay = document.getElementById('sidebarOverlay');

        if (trigger) trigger.onclick = () => modal.classList.remove('hidden');
        if (cancel) cancel.onclick = () => modal.classList.add('hidden');
        if (overlay) overlay.onclick = closeSidebar;

        if (confirm) {
            confirm.onclick = () => {
                console.log("Admin Logging out...");
                localStorage.clear(); // Clear all tokens/sessions
                window.location.href = '/frontend/auth/login.html';
            };
        }
    }

    // Run all initializations
    document.addEventListener('DOMContentLoaded', () => {
        highlightActiveSidebarLink();
        initLogoutLogic();
    });
    
    // In case the sidebar is loaded via fetch (which doesn't always trigger DOMContentLoaded)
    setTimeout(() => {
        highlightActiveSidebarLink();
        initLogoutLogic();
    }, 100);
</script>
