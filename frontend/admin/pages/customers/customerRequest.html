<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part Requests | Yaantra Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../../assets/css/custom.css">
    <link rel="stylesheet" href="../../../assets/css/tailwind.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; background-color: #f8faf9; }
        .table-container { border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 20px 25px -5px rgba(6, 38, 33, 0.05); }
        .status-select {
            background-color: #f9fafb;
            border: 1px solid #f3f4f6;
            border-radius: 0.75rem;
            padding: 0.4rem 0.75rem;
            font-size: 11px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
        }
        .admin-input {
            background-color: #f9fafb;
            border: 1px solid #f3f4f6;
            border-radius: 1rem;
            padding: 0.85rem 1.25rem;
            font-size: 0.875rem;
            width: 100%;
            outline: none;
        }
    </style>
</head>

<body class="min-h-screen text-[#062621]">

<div id="sidebar-container"></div>

<div class="md:ml-64 min-h-screen transition-all duration-300">
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex items-center justify-between">
        <div>
            <h1 class="text-xl font-[800] text-[#062621] tracking-tighter uppercase leading-none">Part Inquiries</h1>
            <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase opacity-70 mt-1">Review and fulfill custom component requests.</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="loadAllRequests()" class="p-2 text-gray-400 hover:text-emerald-500 transition"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            <div class="h-8 w-[1px] bg-gray-100 mx-1"></div>
            <div class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-[10px] font-bold text-[#062621]">AD</div>
        </div>
    </header>

    <div class="p-8 space-y-8 max-w-[1600px] mx-auto">
        <div id="alertBox" class="hidden"></div>
        <div class="relative group">
            <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-300"></i>
            <input id="searchInput" type="text" placeholder="Search by requester or part name..." class="w-full bg-white border-none shadow-sm rounded-2xl py-5 pl-14 pr-6 outline-none text-sm transition">
        </div>

        <div class="table-container bg-white rounded-[2.5rem] overflow-hidden">
            <div class="px-8 py-6 border-b border-gray-50 flex justify-between items-center">
                <h2 class="text-base font-bold text-[#062621] uppercase tracking-tight">Active Part Requests</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-[#062621] text-white/50 text-[10px] uppercase tracking-[0.2em]">
                        <tr>
                            <th class="px-8 py-5 font-bold">#</th>
                            <th class="px-8 py-5 font-bold">Customer</th>
                            <th class="px-8 py-5 font-bold">Part Name</th>
                            <th class="px-8 py-5 font-bold text-center">Qty</th>
                            <th class="px-8 py-5 font-bold">Workflow</th>
                            <th class="px-8 py-5 font-bold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="requestsTable" class="divide-y divide-gray-50 text-sm font-medium">
                        <tr><td colspan="6" class="p-20 text-center text-gray-400 italic">Connecting to system database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- VIEW MODAL -->
<div id="viewModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm hidden p-4">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-24 bg-[#062621]"></div>
        <button onclick="closeModal('viewModal')" class="absolute top-6 right-6 text-white/50 hover:text-white transition z-10"><i data-lucide="x-circle"></i></button>
        <div class="relative mt-8">
            <div id="vInitials" class="w-20 h-20 rounded-full mx-auto border-4 border-white shadow-xl bg-emerald-50 flex items-center justify-center text-xl font-black text-emerald-600 mb-4 uppercase">CU</div>
            <h2 id="vName" class="text-xl font-extrabold text-[#062621] uppercase tracking-tighter text-center">Customer Name</h2>
            <div class="mt-8 space-y-4 text-left bg-gray-50/50 p-6 rounded-[2rem] border border-gray-100">
                <div class="flex flex-col"><span class="text-[9px] font-black text-gray-300 uppercase">Requested Part</span><span id="vPartName" class="text-sm font-bold text-[#062621]"></span></div>
                <div class="flex flex-col mt-3"><span class="text-[9px] font-black text-gray-300 uppercase">Quantity</span><span id="vQty" class="text-sm font-bold text-[#062621]"></span></div>
                <div class="flex flex-col mt-3"><span class="text-[9px] font-black text-gray-300 uppercase">Description</span><p id="vDesc" class="text-xs text-gray-500 italic mt-1"></p></div>
            </div>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm hidden p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
        <div class="bg-[#062621] p-8 flex justify-between items-center text-white">
            <h2 class="font-extrabold uppercase tracking-widest text-white">Edit Inquiry</h2>
            <button onclick="closeModal('editModal')" class="text-2xl font-light">&times;</button>
        </div>
        <form id="editForm" class="p-10 space-y-6">
            <input type="hidden" id="editRequestId">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Part Name</label>
                <input type="text" id="editPartName" class="admin-input">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Quantity</label>
                <input type="number" id="editQty" class="admin-input">
            </div>
            <div class="flex gap-3 pt-6 border-t">
                <button type="submit" class="flex-1 bg-[#062621] text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest transition">Update</button>
                <button type="button" onclick="closeModal('editModal')" class="flex-1 bg-gray-100 text-gray-400 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- DELETE MODAL -->
<div id="deleteConfirmModal" class="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden p-4">
    <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-10 text-center">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="trash-2" class="w-8 h-8"></i></div>
        <h2 class="text-xl font-extrabold text-[#062621]">Delete Request?</h2>
        <div class="flex gap-3 mt-8">
            <button onclick="closeModal('deleteConfirmModal')" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold text-[10px] uppercase">No</button>
            <button id="confirmDeleteBtn" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg shadow-red-200">Delete</button>
        </div>
    </div>
</div>

<script src="../../js/customer-request.js"></script>
<script>
    fetch('/frontend/admin/includes/sidebar-admin.html').then(res => res.text()).then(data => {
        document.getElementById('sidebar-container').innerHTML = data;
        if (window.lucide) lucide.createIcons();
        const currentPath = window.location.pathname;
        document.querySelectorAll('[data-nav-link]').forEach(link => {
            if (currentPath.includes(link.getAttribute('href'))) {
                link.classList.add('bg-[#10b981]', 'shadow-xl'); 
                link.classList.remove('text-white/70', 'text-white');
                link.classList.add('text-[#062621]', 'font-bold');
                const icon = link.querySelector('i');
                if (icon) icon.setAttribute('stroke', '#062621');
            }
        });
    });
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
</script>
</body>
</html>
