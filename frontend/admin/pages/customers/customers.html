<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registry | Yaantra Admin</title>
    
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../../assets/css/custom.css">
    <link rel="stylesheet" href="../../../assets/css/tailwind.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; background-color: #f8faf9; }
        .ts-alert-success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; padding: 1rem; border-radius: 1rem; font-weight: 700; }
        .ts-alert-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; padding: 1rem; border-radius: 1rem; font-weight: 700; }
        .table-container { border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 20px 25px -5px rgba(6, 38, 33, 0.05); }
        
        .admin-input {
            background-color: #f9fafb;
            border: 1px solid #f3f4f6;
            border-radius: 1rem;
            padding: 0.85rem 1.25rem;
            font-size: 0.875rem;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }
        .admin-input:focus {
            background-color: #fff;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.05);
        }
    </style>
</head>

<body class="min-h-screen text-[#062621]">

<div id="sidebar-container"></div>

<!-- ================= MAIN CONTENT ================= -->
<div class="md:ml-64 min-h-screen transition-all duration-300">
    
    <!-- TOP HEADER -->
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex items-center justify-between">
        <div>
            <h1 class="text-xl font-[800] text-[#062621] tracking-tighter uppercase leading-none">Customer Registry</h1>
            <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase opacity-70 mt-1">Global Client Database Management.</p>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="openAddCustomerModal()" class="bg-[#062621] text-white px-5 py-2.5 rounded-xl font-bold text-[11px] uppercase tracking-widest flex items-center gap-2 hover:opacity-90 transition shadow-lg">
                <i data-lucide="user-plus" class="w-4 h-4"></i>
                Register Customer
            </button>
            <div class="h-8 w-[1px] bg-gray-100 mx-1"></div>
            <div class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-[10px] font-bold text-[#062621]">AD</div>
        </div>
    </header>

    <div class="p-8 space-y-8 max-w-[1600px] mx-auto">
        <!-- SEARCH -->
        <div class="relative group">
            <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-300"></i>
            <input id="searchInput" type="text" placeholder="Search customer name, email or phone..." class="w-full bg-white border-none shadow-sm rounded-2xl py-5 pl-14 pr-6 focus:ring-2 focus:ring-emerald-500/20 outline-none font-medium text-sm transition">
        </div>

        <div id="alertBox" class="hidden"></div>

        <!-- TABLE SECTION -->
        <div class="table-container bg-white rounded-[2.5rem] overflow-hidden">
            <div class="px-8 py-6 border-b border-gray-50 flex justify-between items-center">
                <h2 class="text-base font-bold text-[#062621] uppercase tracking-tight">Active Customers</h2>
                <button onclick="loadCustomers(1)" class="text-gray-400 hover:text-emerald-500 transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-[#062621] text-white/50 text-[10px] uppercase tracking-[0.2em]">
                        <tr>
                            <th class="px-8 py-5 font-bold">S.N</th>
                            <th class="px-8 py-5 font-bold">Profile</th>
                            <th class="px-8 py-5 font-bold">Full Name</th>
                            <th class="px-8 py-5 font-bold">Email</th>
                            <th class="px-8 py-5 font-bold">Contact</th>
                            <th class="px-8 py-5 font-bold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customerTable" class="divide-y divide-gray-50 text-sm"></tbody>
                </table>
            </div>
            <div id="paginationNumbers" class="flex justify-center gap-2 p-6 bg-gray-50/50"></div>
        </div>
    </div>
</div>

<!-- ================= MODALS ================= -->

<!-- ADD / EDIT CUSTOMER MODAL -->
<div id="customerModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm hidden p-4">
    <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
        <div class="bg-[#062621] p-8 flex justify-between items-center text-white">
            <h2 id="modalTitle" class="font-extrabold uppercase tracking-[0.2em] text-white">Customer Registration</h2>
            <button onclick="closeModal('customerModal')" class="text-white/50 hover:text-white transition text-2xl font-light">&times;</button>
        </div>
        <form id="customerForm" class="p-10 space-y-6">
            <!-- Modal Alert Display -->
            <div id="modalAlert" class="hidden text-[10px] font-bold p-3 rounded-xl mb-4"></div>
            
            <input type="hidden" id="customerId">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">First Name</label>
                    <input type="text" id="cFirstName" placeholder="e.g. Kabita" class="admin-input" required>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Last Name</label>
                    <input type="text" id="cLastName" placeholder="e.g. Rana" class="admin-input" required>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Email Address</label>
                    <input type="email" id="cEmail" placeholder="kabita@gmail.com" class="admin-input" required>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Phone</label>
                    <input type="tel" id="cPhone" placeholder="9801234567" class="admin-input">
                </div>
                <div id="passwordField">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Access Password</label>
                    <input type="password" id="cPassword" placeholder="••••••••••••" class="admin-input">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Profile Avatar</label>
                    <input type="file" id="cProfilePicture" accept="image/*" class="w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer">
                </div>
            </div>
            <div class="flex gap-3 pt-6 border-t border-gray-50">
                <button type="submit" id="saveClientBtn" class="flex-1 bg-[#062621] text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest transition hover:opacity-95 shadow-lg">Save Client</button>
                <button type="button" onclick="closeModal('customerModal')" class="flex-1 bg-gray-100 text-gray-400 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-gray-200">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- VIEW MODAL -->
<div id="viewCustomerModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm hidden p-4">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-24 bg-[#062621]"></div>
        <img id="vCustomerProfilePic" src="" class="w-24 h-24 rounded-full mx-auto border-4 border-white relative mt-6 shadow-xl object-cover mb-4">
        <h2 id="vCustomerName" class="text-xl font-extrabold uppercase tracking-tight text-[#062621]">Customer Name</h2>
        <p class="text-[9px] bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full inline-block font-black uppercase tracking-widest mt-2">Verified Personnel</p>
        <div class="mt-8 space-y-4 text-left bg-gray-50/50 p-6 rounded-[2rem] border border-gray-100">
            <div class="flex flex-col"><span class="text-[9px] font-black text-gray-300 uppercase">Email</span><span id="vCustomerEmail" class="text-sm font-bold"></span></div>
            <div class="flex flex-col mt-4"><span class="text-[9px] font-black text-gray-300 uppercase">Phone</span><span id="vCustomerPhone" class="text-sm font-bold"></span></div>
        </div>
        <button onclick="closeModal('viewCustomerModal')" class="mt-8 text-gray-400 font-bold uppercase text-[10px] tracking-widest hover:text-red-500 transition">Close Profile</button>
    </div>
</div>

<!-- DELETE MODAL -->
<div id="deleteConfirmModal" class="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden p-4">
    <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-10 text-center">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="trash-2" class="w-8 h-8"></i></div>
        <h2 class="text-xl font-extrabold text-[#062621]">Terminate Account?</h2>
        <div class="flex gap-3 mt-8">
            <button onclick="closeModal('deleteConfirmModal')" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold text-[10px] uppercase">No</button>
            <button id="confirmDeleteBtn" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg shadow-red-200">Delete</button>
        </div>
    </div>
</div>

<script src="../../js/customer.js"></script>
<script>
    // SIDEBAR INJECTION
   fetch('/frontend/admin/includes/sidebar-admin.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('sidebar-container').innerHTML = data;
            if (typeof lucide !== 'undefined') lucide.createIcons();

           
            const currentPath = window.location.pathname;
            document.querySelectorAll('[data-nav-link]').forEach(link => {
                if (currentPath.includes(link.getAttribute('href'))) {
                    
                    link.classList.add('bg-[#10b981]', 'shadow-xl');
                    
                   
                    link.classList.remove('text-white/70', 'text-white');
                    link.classList.add('text-[#062621]', 'font-bold');
                    
                    const icon = link.querySelector('i');
                    if (icon) {
                        icon.setAttribute('stroke', '#062621');
                    }
                }
            });
        });
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
</script>
</body>
</html>
