<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | Yaantra Admin</title>
    
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../../assets/css/custom.css">
    <link rel="stylesheet" href="../../../assets/css/tailwind.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; }
        .ts-alert-success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; padding: 1rem; border-radius: 1.5rem; font-weight: 700; }
        .ts-alert-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; padding: 1rem; border-radius: 1.5rem; font-weight: 700; }
    </style>
</head>

<body class="bg-[#f8faf9] min-h-screen text-[#062621]">

<!-- Sidebar Container -->
<div id="sidebar-container"></div>

<!-- ================= MAIN CONTENT ================= -->
<div class="md:ml-64 min-h-screen transition-all duration-300">
    
    <!-- TOP HEADER -->
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex items-center justify-between">
        <div>
            <h1 class="text-xl font-[800] text-[#062621] tracking-tighter uppercase">Modify Product</h1>
            <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase opacity-70 mt-1">Inventory Management Portal</p>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="products.html" class="text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-[#062621] transition">Back to Catalog</a>
            <div class="h-8 w-[1px] bg-gray-100 mx-1"></div>
            <div class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-[10px] font-bold">AD</div>
        </div>
    </header>

    <div class="p-8 max-w-5xl mx-auto space-y-8">
        
        <!-- ALERT BOX FOR FEEDBACK -->
        <div id="alertBox" class="hidden text-center"></div>

        <!-- MAIN FORM CARD -->
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden p-10">
            <div class="mb-10 flex items-center gap-6 border-b border-gray-50 pb-8">
                <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center shadow-inner">
                    <i data-lucide="edit-3" class="w-8 h-8"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-[800] text-[#062621] uppercase tracking-tighter">Product Details</h2>
                    <p class="text-xs text-gray-400 font-medium">Updating system records for selected item.</p>
                </div>
            </div>

            <form id="editProductForm" class="space-y-8" enctype="multipart/form-data">
                <input type="hidden" id="productId" name="productId">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Name -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Product Name</label>
                        <input type="text" id="name" name="name" class="bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500/20 text-sm font-medium outline-none" required>
                        <p id="nameError" class="hidden text-red-500 text-[10px] font-bold mt-1"></p>
                    </div>

                    <!-- SKU -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">SKU Identification</label>
                        <input type="text" id="sku" name="sku" class="bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500/20 text-sm font-medium outline-none" required>
                        <p id="skuError" class="hidden text-red-500 text-[10px] font-bold mt-1"></p>
                    </div>

                    <!-- Price -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Pricing (NPR)</label>
                        <input type="number" id="price" name="price" class="bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500/20 text-sm font-medium outline-none" required>
                        <p id="priceError" class="hidden text-red-500 text-[10px] font-bold mt-1"></p>
                    </div>

                    <!-- Stock -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Inventory Quantity</label>
                        <input type="number" id="stockQty" name="stockQty" class="bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500/20 text-sm font-medium outline-none" required>
                        <p id="stockQtyError" class="hidden text-red-500 text-[10px] font-bold mt-1"></p>
                    </div>

                    <!-- Category -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Classification</label>
                        <select id="categoryId" name="categoryId" class="bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500/20 text-sm font-medium outline-none appearance-none" required>
                            <option value="">Select Category</option>
                        </select>
                        <p id="categoryIdError" class="hidden text-red-500 text-[10px] font-bold mt-1"></p>
                    </div>

                    <!-- Add Images -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Upload New Media</label>
                        <input type="file" id="images" name="images" multiple class="text-xs text-gray-400 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer">
                    </div>
                </div>

                <!-- Description -->
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Product Description</label>
                    <textarea id="description" name="description" rows="4" class="bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500/20 text-sm font-medium outline-none resize-none"></textarea>
                    <p id="descriptionError" class="hidden text-red-500 text-[10px] font-bold mt-1"></p>
                </div>

                <!-- Existing Images Display -->
                <div class="space-y-4 pt-6 border-t border-gray-50">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Current Media Assets</label>
                    <div id="productImages" class="flex flex-wrap gap-4">
                        <!-- Images dynamically injected by JS -->
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-4 pt-10">
                    <button type="submit" class="flex-1 bg-[#062621] text-white py-5 rounded-[1.5rem] font-black text-[11px] uppercase tracking-[0.2em] transition hover:opacity-95 shadow-xl shadow-emerald-950/10">Commit Changes</button>
                    <a href="products.html" class="flex-1 bg-gray-100 text-gray-400 py-5 rounded-[1.5rem] font-black text-[11px] uppercase tracking-[0.2em] text-center hover:bg-gray-200 transition">Discard</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="../../js/edit-product.js"></script>
<script>
    // SIDEBAR & ACTIVE LINK HIGHLIGHTER
    fetch('/frontend/admin/includes/sidebar-admin.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('sidebar-container').innerHTML = data;
            if (window.lucide) lucide.createIcons();

            const currentPath = window.location.pathname;
            document.querySelectorAll('[data-nav-link]').forEach(link => {
                if (link.getAttribute('href').includes('products.html')) {
                    link.classList.add('bg-[#10b981]', 'shadow-sm'); 
                    link.classList.remove('text-white/70', 'text-white');
                    link.classList.add('text-[#062621]', 'font-bold');
                    const icon = link.querySelector('i');
                    if (icon) icon.setAttribute('stroke', '#062621');
                }
            });
        });
</script>

</body>
</html>
