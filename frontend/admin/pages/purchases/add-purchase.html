<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Purchase | Yaantra Admin</title>
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../../assets/css/custom.css">
    <link rel="stylesheet" href="../../../assets/css/tailwind.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; background-color: #f8faf9; }
        .admin-input {
            background-color: #f9fafb;
            border: 1px solid #f3f4f6;
            border-radius: 1rem;
            padding: 0.75rem 1.25rem;
            font-size: 0.875rem;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }
        .admin-input:focus { background-color: #fff; border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.05); }
        
        .ts-alert-success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; padding: 1rem; border-radius: 1rem; font-weight: 700; }
        .ts-alert-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; padding: 1rem; border-radius: 1rem; font-weight: 700; }
    </style>
</head>

<body class="min-h-screen text-[#062621]">

<!-- Auth Guard -->
<script>
    const token = localStorage.getItem('token');
    const userRole = localStorage.getItem('userRole');
    if (!token || userRole !== 'Admin') {
        window.location.href = '/frontend/auth/login.html?message=Login First';
    }
</script>

<div id="sidebar-container"></div>

<!-- ================= MAIN CONTENT ================= -->
<div class="md:ml-64 min-h-screen transition-all duration-300">
    
    <!-- TOP HEADER -->
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex items-center justify-between">
        <div>
            <h1 class="text-xl font-extrabold text-[#062621] tracking-tighter uppercase leading-none">New Purchase Intake</h1>
            <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase opacity-70 mt-1">Inventory Restocking Portal</p>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="purchases.html" class="text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-[#062621] transition">Cancel Process</a>
            <div class="h-8 w-[1px] bg-gray-100 mx-1"></div>
            <div class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-[10px] font-bold text-[#062621]">AD</div>
        </div>
    </header>

    <div class="p-8 max-w-6xl mx-auto space-y-8">
        
        <div id="alertBox" class="hidden text-center"></div>

        <form id="purchaseForm" class="space-y-8">
            
            <!-- VENDOR SELECTION CARD -->
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-white p-10">
                <div class="flex items-center gap-5 mb-8">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center">
                        <i data-lucide="truck" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-black uppercase tracking-tight">Supplier Source</h2>
                        <p class="text-xs text-gray-400">Identify the authorized vendor for this intake.</p>
                    </div>
                </div>

                <div class="max-w-md">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Select Active Vendor</label>
                    <select id="vendorUserId" name="vendorUserId" class="admin-input font-bold text-[#062621] appearance-none" required>
                        <option value="">-- Choose a vendor --</option>
                    </select>
                </div>
            </div>

            <!-- PURCHASE ITEMS CARD -->
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden">
                <div class="p-8 border-b border-gray-50 flex justify-between items-center bg-gray-50/30">
                    <div class="flex items-center gap-4">
                        <h2 class="text-base font-black text-[#062621] uppercase tracking-tight">Purchase Line Items</h2>
                    </div>
                    <button type="button" id="addPurchaseItemBtn" class="bg-[#062621] text-white px-5 py-2.5 rounded-xl font-bold text-[11px] uppercase tracking-widest flex items-center gap-2 hover:opacity-90 transition">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i>
                        Add Item
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-[#062621] text-white/50 text-[10px] uppercase tracking-[0.2em]">
                            <tr>
                                <th class="px-8 py-5 font-bold">Product Selection</th>
                                <th class="px-8 py-5 font-bold">Current Stock</th>
                                <th class="px-8 py-5 font-bold">Quantity</th>
                                <th class="px-8 py-5 font-bold">Unit Price</th>
                                <th class="px-8 py-5 font-bold">Sub Total</th>
                                <th class="px-8 py-5 font-bold text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="purchaseItemsContainer" class="divide-y divide-gray-50 text-sm font-medium">
                            <!-- JS rows here -->
                        </tbody>
                    </table>
                </div>

                <!-- TOTAL SUMMARY SECTION -->
                <div class="p-10 bg-[#062621] text-white flex flex-col md:flex-row justify-between items-center gap-6 border-t-4 border-emerald-500">
                    <div class="flex flex-col items-start gap-3">
                        <div class="flex items-center gap-3">
                            <div class="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center">
                                <i data-lucide="calculator" class="w-7 h-7 text-[#062621]"></i>
                            </div>
                            <div>
                                <span class="text-[10px] text-emerald-300 font-black uppercase tracking-[0.25em]">Total Procurement Valuation</span>
                                <h3 id="totalAmount" class="text-6xl font-black mt-2 text-emerald-400">Rs 0.00</h3>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex gap-3">
                        <button type="submit" class="bg-emerald-500 text-[#062621] px-10 py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] shadow-xl hover:bg-white transition duration-300">
                            Create Purchase Invoice
                        </button>
                        <a href="purchases.html" class="bg-white/10 text-white/60 px-8 py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] hover:bg-white/20 transition">
                            Cancel
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="../../js/add-purchase.js"></script>
<script>
    // SIDEBAR INJECTION
    fetch('/frontend/admin/includes/sidebar-admin.html').then(res => res.text()).then(data => {
        document.getElementById('sidebar-container').innerHTML = data;
        if (window.lucide) lucide.createIcons();

        
        document.querySelectorAll('[data-nav-link]').forEach(link => {
            if (link.getAttribute('href').includes('purchases.html')) {
                link.classList.add('bg-emerald-50', 'shadow-sm'); 
                link.classList.remove('text-white/70', 'text-white');
                link.classList.add('text-[#062621]', 'font-bold');
                const icon = link.querySelector('i');
                if (icon) icon.setAttribute('stroke', '#062621');
            }
        });
    });
</script>

</body>
</html>
