<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>YAANTRA - Cart</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link rel="stylesheet" href="../assets/css/tailwind.css">

  <!-- JS -->
  <script src="../assets/js/cart.js"></script>
</head>

<body class="min-h-screen flex flex-col bg-[#f4f5f6] text-gray-900 [font-family:'Sora',sans-serif]">

  <!-- Header -->
  <div id="storefront-header-container"></div>

  <!-- MAIN -->
  <main class="flex-grow pt-[185px] md:pt-[265px] lg:pt-[210px] pb-20 bg-[#f4f5f6]">

    <section>
      <div class="container mx-auto px-4 md:px-6">

        <!-- PAGE TITLE -->
        <div class="text-center mb-12">
          <div class="flex items-center justify-center gap-3">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-900 font-['Playfair_Display']">
              Your Cart
            </h1>
          </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-[1fr_650px] gap-8 items-start">
          <div>
            <div id="cart-items-container" class="space-y-5">
            </div>
            <div id="empty-cart"
              class="hidden bg-white border border-[#e5e7eb] rounded-3xl p-12 md:p-20 text-center shadow-sm">
              <div
                class="w-24 h-24 rounded-full bg-[var(--color-primary)]/10 flex items-center justify-center mx-auto mb-6">
                <svg class="w-12 h-12 text-[var(--color-primary)]" fill="none" stroke="currentColor"
                  viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m10-9l2 9m-6 9a1 1 0 11-2 0 1 1 0 012 0zm8 0a1 1 0 11-2 0 1 1 0 012 0z" />
                </svg>
              </div>
              <h2 class="text-3xl font-bold text-gray-900 mb-3">
                Your cart is empty
              </h2>
              <p class="text-gray-500 mb-8">
                Add vehicle parts to continue.
              </p>

              <a href="shop.html"
                class="btn-primary inline-flex items-center justify-center px-8 py-3 rounded-xl font-semibold transition hover:scale-[1.02]">
                Continue Shopping
              </a>

            </div>

          </div>

          <!-- RIGHT -->
          <div id="checkout-panel">

            <div
              class="bg-white rounded-2xl border border-[#e5e7eb] shadow-sm sticky top-32 overflow-hidden">

              <!-- TOP -->
              <div class="p-6 border-b border-[#eeeeee] bg-gradient-to-r from-[#f8f9fa] to-white">

                <div class="flex items-center justify-between">

                  <div>
                    <h2 class="text-xl font-bold text-gray-900">
                      Order Summary
                    </h2>
                  </div>

                  <div
                    class="w-12 h-12 rounded-lg bg-[var(--color-primary)]/10 flex items-center justify-center">

                    <svg class="w-6 h-6 text-[var(--color-primary)]" fill="none" stroke="currentColor"
                      viewBox="0 0 24 24">

                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 8h14l-1 11H6L5 8zm2-3h10l1 3H6l1-3z" />

                    </svg>

                  </div>

                </div>

              </div>

              <!-- BODY -->
              <div class="p-8">

                <!-- TABS -->
                <div class="grid grid-cols-3 bg-[#f4f5f6] rounded-lg p-1 mb-6">

                  <button onclick="goToStep(1)" id="tab-1"
                    class="rounded-lg py-2 px-3 text-xs font-semibold bg-[var(--color-primary)] text-white transition-all shadow-sm">
                    Summary
                  </button>

                  <button onclick="goToStep(2)" id="tab-2"
                    class="rounded-lg py-2 px-3 text-xs font-semibold text-gray-600 hover:bg-white transition-all">
                    Checkout
                  </button>

                  <button onclick="goToStep(3)" id="tab-3"
                    class="rounded-lg py-2 px-3 text-xs font-semibold text-gray-600 hover:bg-white transition-all">
                    Payment
                  </button>

                </div>


                <!-- ================= CUSTOM CHECKOUT STEPS ================= -->
                <div id="step-summary" class="step-panel active">
                  <!-- ITEMS -->
                  <div id="summary-items" class="space-y-4 max-h-96 overflow-y-auto pr-2 mb-8 text-sm"></div>
                  <!-- PRICE -->
                  <div class="bg-gradient-to-br from-[#f8f9fa] to-[#fafafa] rounded-xl border border-[#ededed] p-7 space-y-4">
                    <div class="flex justify-between text-sm text-red-600">
                      <span>Subtotal</span>
                      <span id="summary-subtotal" class="font-semibold">Rs. 0.00</span>
                    </div>
                    <div id="summary-discount-row" class="hidden">
                      <div class="flex justify-between text-sm text-green-600">
                        <span>Discount (10%)</span>
                        <span id="summary-discount" class="font-semibold">- Rs. 0.00</span>
                      </div>
                    </div>
                    <div class="pt-3 border-t border-dashed border-[#dcdcdc] flex items-center justify-between">
                      <span class="text-base font-bold text-gray-900">Total</span>
                      <span id="summary-total" class="text-xl font-bold text-[var(--color-primary)]">Rs. 0.00</span>
                    </div>
                  </div>
                  <button onclick="showOrderForm()" class="btn-primary w-full h-12 rounded-lg font-semibold text-base mt-6 transition hover:scale-[1.01]">Proceed to Checkout</button>
                </div>

                <div id="step-orderform" class="step-panel hidden">
                  <h3 class="text-xl font-bold text-gray-900 mb-6">Enter Your Details</h3>
                  <form id="order-details-form" class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                      <div>
                        <label class="block text-sm font-semibold mb-2">Full Name</label>
                        <input id="order-fullname" type="text" placeholder="Enter Full Name" required class="w-full h-11 px-4 rounded-lg border border-[#e5e7eb] bg-[#fafafa] focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] text-sm">
                        <p id="fullnameError" class="hidden text-red-600 text-xs mt-1 font-bold"></p>
                      </div>
                      <div>
                        <label class="block text-sm font-semibold mb-2">Email Address</label>
                        <input id="order-email" type="email" placeholder="Enter Email Address" required class="w-full h-11 px-4 rounded-lg border border-[#e5e7eb] bg-[#fafafa] focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] text-sm">
                        <p id="emailError" class="hidden text-red-600 text-xs mt-1 font-bold"></p>
                      </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                      <div>
                        <label class="block text-sm font-semibold mb-2">Phone Number</label>
                        <input id="order-phone" type="text" inputmode="numeric" maxlength="10" placeholder="Enter Phone Number" required class="w-full h-11 px-4 rounded-lg border border-[#e5e7eb] bg-[#fafafa] focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] text-sm">
                        <p id="phoneError" class="hidden text-red-600 text-xs mt-1 font-bold"></p>
                      </div>
                      <div>
                        <label class="block text-sm font-semibold mb-2">Delivery Address</label>
                        <textarea id="order-address" rows="2" required placeholder="Enter Delivery Address" class="w-full px-4 py-2 rounded-lg border border-[#e5e7eb] bg-[#fafafa] focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] text-sm resize-none"></textarea>
                        <p id="addressError" class="hidden text-red-600 text-xs mt-1 font-bold"></p>
                      </div>
                    </div>
                    <div class="flex gap-3 mt-7">
                      <button type="button" onclick="showSummary()" class="w-1/2 h-12 rounded-lg border border-[#dddddd] font-semibold text-sm hover:bg-[#f5f5f5] transition">Back</button>
                      <button type="submit" class="btn-primary w-1/2 h-12 rounded-lg font-semibold text-sm transition hover:scale-[1.01]">Continue</button>
                    </div>
                  </form>
                </div>

                <div id="step-payment" class="step-panel hidden">
                  <h3 class="text-lg font-bold text-gray-900 mb-4">Payment Method</h3>
                  <div class="space-y-3">
                    <label class="flex items-center gap-4 p-3 rounded-lg border border-[#e5e7eb] cursor-pointer hover:border-[var(--color-primary)] hover:bg-[#f9f9f9] transition">
                      <input type="radio" name="payment-method" value="Pay Later" checked class="w-4 h-4">
                      <div>
                        <p class="font-semibold text-sm text-gray-900">Pay Later</p>
                        <p class="text-xs text-gray-500">Receive invoice via email</p>
                      </div>
                    </label>
                    <label class="flex items-center gap-4 p-3 rounded-lg border border-[#e5e7eb] cursor-pointer hover:border-[var(--color-primary)] hover:bg-[#f9f9f9] transition">
                      <input type="radio" name="payment-method" value="Cash on Delivery" class="w-4 h-4">
                      <div>
                        <p class="font-semibold text-sm text-gray-900">Cash on Delivery</p>
                        <p class="text-xs text-gray-500">Pay when order arrives</p>
                      </div>
                    </label>
                    <label class="flex items-center gap-4 p-3 rounded-lg border border-[#e5e7eb] cursor-pointer hover:border-[var(--color-primary)] hover:bg-[#f9f9f9] transition">
                      <input type="radio" name="payment-method" value="Khalti" class="w-4 h-4">
                      <div>
                        <p class="font-semibold text-sm text-gray-900">Pay with Khalti</p>
                        <p class="text-xs text-gray-500">Secure online payment</p>
                      </div>
                    </label>
                  </div>
                  <div class="flex gap-3 mt-6">
                    <button type="button" onclick="showOrderForm()" class="w-1/2 h-12 rounded-lg border border-[#dddddd] font-semibold text-sm hover:bg-[#f5f5f5] transition">Back</button>
                    <button type="button" onclick="placeOrder(event)" class="btn-primary w-1/2 h-12 rounded-lg font-semibold text-sm transition hover:scale-[1.01]">Make Payment</button>
                  </div>
                </div>

              </div>

            </div>

          </div>

        </div>

      </div>
    </section>

  </main>

  <!-- Footer -->
  <div id="storefront-footer-container"></div>

  <!-- TOAST -->
  <div id="toast"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 pointer-events-none bg-[#111111] text-white px-5 py-3 rounded-xl text-sm font-medium z-[9999] transition-all duration-300 whitespace-nowrap shadow-xl">
  </div>
  <script src="../assets/js/jwt-decode.js"></script>
  <script src="../assets/js/homepage.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      includeStorefrontHeader();
      includeStorefrontFooter();
    });
  </script>
</body>
</html>
