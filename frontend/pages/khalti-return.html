<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing Payment - YAANTRA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100">
    <div class="text-center">
        <div class="mb-8">
            <div class="w-16 h-16 rounded-full border-4 border-gray-300 border-t-blue-600 animate-spin mx-auto"></div>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-3">Processing Your Payment</h1>
        <p class="text-gray-600 mb-8">Please wait while we verify your payment with Khalti...</p>
                <div id="status-message" class="mt-6 text-sm text-gray-600">
            Verifying payment details...
        </div>
        <div id="error-message" class="hidden mt-6 bg-red-50 border border-red-200 rounded-lg p-4 max-w-md mx-auto">
            <h3 class="font-semibold text-red-700 mb-2">Payment Verification Failed</h3>
            <p id="error-text" class="text-red-600 text-sm mb-4"></p>
        <div class="flex gap-3">
                <a href="/frontend/pages/cart.html" class="flex-1 px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                    Back to Cart
                </a>
                <button onclick="location.reload()" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Retry
                </button>
            </div>
        </div>

        <!-- Success message (hidden by default) -->
        <div id="success-message" class="hidden mt-6">
            <div class="mb-6">
                <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-green-700 mb-2">Order Successfully Placed!</h2>
            <p class="text-green-600 text-sm mb-4">Your payment has been received and order is being processed.</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5033/api';

        async function verifyPayment() {
            try {
                // Get PIDX from URL query parameters
                const urlParams = new URLSearchParams(window.location.search);
                const pidx = urlParams.get('pidx');
                const khaltiStatus = urlParams.get('status');

                console.log('Return parameters:', { pidx, khaltiStatus });

                if (!pidx) {
                    showError('No payment ID found in return URL. Payment verification failed.');
                    return;
                }

                // Show callback status for debugging
                document.getElementById('status-message').textContent = `Khalti Status: ${khaltiStatus || 'Unknown'}. Verifying with backend...`;

                // Get auth token
                const token = localStorage.getItem('token');
                if (!token) {
                    showError('Session expired. Please login and try again.');
                    setTimeout(() => {
                        window.location.href = '/frontend/auth/login.html?msg=session_expired';
                    }, 2000);
                    return;
                }

                // Verify with retry logic for timeout errors
                let retries = 0;
                const maxRetries = 3;
                const timeoutMs = 45000; // 45 seconds timeout

                async function attemptVerify() {
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

                        const verifyRes = await fetch(`${API_BASE}/payment/verify`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ pidx: pidx }),
                            signal: controller.signal
                        });

                        clearTimeout(timeoutId);
                        const verifyData = await verifyRes.json().catch(() => ({}));

                        if (!verifyRes.ok) {
                            // Retry on 504 or 503 gateway errors
                            if ((verifyRes.status === 504 || verifyRes.status === 503) && retries < maxRetries) {
                                retries++;
                                document.getElementById('status-message').textContent = `Verifying payment (Attempt ${retries + 1}/${maxRetries + 1})...`;
                                await new Promise(resolve => setTimeout(resolve, 2000));
                                return attemptVerify();
                            }

                            // Payment verification failed
                            const errorMsg = verifyData.error || verifyData.message || `Backend error: ${verifyRes.status}`;
                            console.error('Verification failed:', verifyData);
                            showError(errorMsg);
                            return;
                        }

                        // Payment verified successfully
                        if (verifyData.success && verifyData.status === 'Completed') {
                            showSuccess(verifyData.orderId, verifyData.orderNumber, verifyData.amount);
                            return;
                        }

                        // Payment exists but not completed
                        showError(`Payment status: ${verifyData.status || 'Unknown'}. ${verifyData.message || 'Payment not completed.'}`);

                    } catch (err) {
                        clearTimeout(timeoutId);
                        
                        // Retry on timeout or network errors
                        if ((err.name === 'AbortError' || !navigator.onLine) && retries < maxRetries) {
                            retries++;
                            document.getElementById('status-message').textContent = `Verifying payment (Attempt ${retries + 1}/${maxRetries + 1})...`;
                            await new Promise(resolve => setTimeout(resolve, 2000));
                            return attemptVerify();
                        }

                        console.error('Verification error:', err);
                        const errorMsg = err.name === 'AbortError'
                            ? 'Verification request timeout. Please wait a moment and try again.'
                            : `Error: ${err.message}`;
                        showError(errorMsg);
                    }
                }

                await attemptVerify();

            } catch (err) {
                console.error('Unexpected verification error:', err);
                showError(`Unexpected error: ${err.message}`);
            }
        }

        function showError(message) {
            document.getElementById('status-message').classList.add('hidden');
            document.getElementById('error-message').classList.remove('hidden');
            document.getElementById('error-text').textContent = message;
        }

        function showSuccess(orderId, orderNumber, amount) {
            document.getElementById('status-message').classList.add('hidden');
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('success-message').classList.remove('hidden');
            setTimeout(() => {
                window.location.href = `/frontend/user/pages/orderHistory/order.html?orderId=${orderId}`;
            }, 2000);
        }
        document.addEventListener('DOMContentLoaded', verifyPayment);
    </script>
</body>
</html>
